name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    name: verify (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  # Smoke hits the live network (DoH/HTTP/RDAP/TLS), so it is NOT a required gate:
  # a third-party blip must not red the build. Correctness is covered
  # hermetically by `npm test`. This job stays visible but non-blocking.
  smoke:
    runs-on: ubuntu-latest
    name: smoke (live network, non-blocking)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build && npm run smoke
